<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Integrity — Dig Compliance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6f8;color:#1a1a2e;font-family:'Open Sans',sans-serif;font-size:13px;line-height:1.5;min-height:100vh}

/* HEADER */
header{background:#0d3349;color:#fff;padding:0 32px;height:54px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.logo-mark{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#fff;opacity:.9}
.logo-title{font-size:15px;font-weight:700;color:#fff}
.logo-sep{width:1px;height:22px;background:rgba(255,255,255,.25)}
.gen-at{font-size:11px;color:rgba(255,255,255,.6);margin-left:auto}
.view-tabs{display:flex;gap:0}
.view-tab{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:5px 16px;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;background:transparent}
.view-tab:first-child{border-radius:3px 0 0 3px}
.view-tab:last-child{border-radius:0 3px 3px 0;border-left:none}
.view-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.view-tab.active{background:#0073cf;border-color:#0073cf;color:#fff}

/* CONTROLS BAR */
.controls{background:#fff;border-bottom:1px solid #dde1e7;padding:10px 32px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.control-group{display:flex;align-items:center;gap:6px}
.control-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#6b7280}
select,input[type=text]{background:#fff;border:1px solid #c8cdd5;color:#1a1a2e;font-family:'Open Sans',sans-serif;font-size:12px;padding:5px 10px;border-radius:4px;outline:none;transition:border-color .15s}
select:focus,input[type=text]:focus{border-color:#0073cf;box-shadow:0 0 0 2px rgba(0,115,207,.12)}
.btn{background:#fff;border:1px solid #c8cdd5;color:#374151;font-family:'Open Sans',sans-serif;font-size:11px;font-weight:600;padding:5px 14px;border-radius:4px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em}
.btn:hover{border-color:#0073cf;color:#0073cf;background:#f0f7ff}
.filter-sep{width:1px;height:26px;background:#e5e7eb;margin:0 2px}

/* MAIN */
main{padding:24px 32px;max-width:1600px}

/* SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.card{background:#fff;border:1px solid #dde1e7;border-radius:6px;padding:16px 18px;display:flex;flex-direction:column;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6b7280}
.card-value{font-size:26px;font-weight:700;line-height:1.1;color:#0d3349}
.card-sub{font-size:11px;color:#9ca3af}
.card.danger{border-left:4px solid #dc2626;border-color:#fecaca}.card.danger .card-value{color:#dc2626}
.card.warn{border-left:4px solid #f59e0b}.card.warn .card-value{color:#d97706}
.card.good{border-left:4px solid #16a34a}.card.good .card-value{color:#16a34a}
.card.info{border-left:4px solid #0073cf}.card.info .card-value{color:#0073cf}

/* FLAGS */
.flags-banner{background:#fef2f2;border:1px solid #fecaca;border-left:4px solid #dc2626;border-radius:6px;padding:12px 16px;margin-bottom:18px;display:none}
.flags-banner.visible{display:block}
.flags-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#dc2626;margin-bottom:8px}
.flag-item{font-size:12px;color:#7f1d1d;padding:2px 0}
.flag-item strong{color:#dc2626}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b7280}
.row-count{font-size:11px;color:#9ca3af}

/* TABLE */
.table-wrap{overflow-x:auto;border:1px solid #dde1e7;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff}
thead th{background:#f8f9fb;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;padding:9px 12px;text-align:left;border-bottom:2px solid #e5e7eb;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:#0073cf}
thead th.sorted{color:#0073cf}
.sort-arrow{margin-left:3px;opacity:.4}
thead th.sorted .sort-arrow{opacity:1}
tbody tr{border-bottom:1px solid #f3f4f6;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f0f7ff}
td{padding:8px 12px;vertical-align:middle;white-space:nowrap;color:#374151}
td.wrap{white-space:normal;max-width:240px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:12px;white-space:nowrap;text-transform:uppercase}
.badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge.overdue,.badge.outage_after_compliance{background:#fee2e2;color:#dc2626}
.badge.overdue .badge-dot,.badge.outage_after_compliance .badge-dot{background:#dc2626}
.badge.within_30{background:#fff7ed;color:#c2410c}
.badge.within_30 .badge-dot{background:#ea580c}
.badge.within_60{background:#fefce8;color:#a16207}
.badge.within_60 .badge-dot{background:#ca8a04}
.badge.within_90{background:#eff6ff;color:#1d4ed8}
.badge.within_90 .badge-dot{background:#2563eb}
.badge.on_track{background:#f0fdf4;color:#15803d}
.badge.on_track .badge-dot{background:#16a34a}
.badge.unknown{background:#f9fafb;color:#9ca3af}
.badge.unknown .badge-dot{background:#d1d5db}

/* PROGRESS */
.progress-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.progress-bar{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:#0073cf}
.progress-fill.complete{background:#16a34a}
.progress-label{font-size:11px;color:#6b7280;min-width:32px;text-align:right}

/* DENT / ACONEX */
.tag-dent{font-size:10px;font-weight:700;color:#d97706;background:#fff7ed;border:1px solid #fde68a;padding:2px 7px;border-radius:10px}
.tag-no{color:#d1d5db;font-size:12px}
.tag-yes{color:#16a34a;font-size:12px;font-weight:700}
.tag-no-aconex{color:#dc2626;font-size:12px;font-weight:700}

/* ROLLUP */
.rollup-section{margin-bottom:20px}
.rollup-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0d3349;color:#fff;border-radius:6px 6px 0 0;cursor:pointer;user-select:none}
.rollup-header:hover{background:#0f3d57}
.rollup-div-name{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff}
.rollup-stats{display:flex;gap:18px;margin-left:auto}
.rollup-stat{font-size:11px;color:rgba(255,255,255,.6)}
.rollup-stat span{color:#fff;font-weight:600}
.rollup-chevron{font-size:10px;color:rgba(255,255,255,.6);transition:transform .2s}
.rollup-header.collapsed .rollup-chevron{transform:rotate(-90deg)}
.rollup-body{border:1px solid #dde1e7;border-top:none;border-radius:0 0 6px 6px;overflow:hidden}
.rollup-body.hidden{display:none}

/* EMPTY */
.empty-state{text-align:center;padding:48px;color:#9ca3af;font-size:13px}

/* LOADING */
#loading{position:fixed;inset:0;background:#f4f6f8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#0073cf;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#9ca3af}
</style>
</head>

var STATUS_LABELS = {
  outage_after_compliance:'Outage After Compliance',
  overdue:'Overdue',within_30:'< 30 Days',within_60:'< 60 Days',
  within_90:'< 90 Days',on_track:'On Track',unknown:'No Date'
};

function init() {
  ALL_DATA = DATA.projects || [];
  document.getElementById('gen-at').textContent = 'Updated: ' + new Date(DATA.generated_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  var pmSel=document.getElementById('pm-select');
  var divSel=document.getElementById('div-filter');
  var distSel=document.getElementById('dist-filter');

  (DATA.project_managers||[]).forEach(function(pm){
    var o=document.createElement('option');o.value=pm;o.textContent=pm;pmSel.appendChild(o);
  });
  (DATA.divisions||[]).forEach(function(d){
    var o=document.createElement('option');o.value=d;o.textContent=d;divSel.appendChild(o);
  });
  (DATA.districts||[]).forEach(function(d){
    var o=document.createElement('option');o.value=d;o.textContent=d;distSel.appendChild(o);
  });

  document.getElementById('loading').style.display='none';
  document.getElementById('main-content').style.display='block';
  render();
}

function getFiltered() {
  var pm=document.getElementById('pm-select').value;
  var div=document.getElementById('div-filter').value;
  var dist=document.getElementById('dist-filter').value;
  var status=document.getElementById('status-filter').value;
  var search=document.getElementById('search-box').value.toLowerCase().trim();
  return ALL_DATA.filter(function(r){
    if(pm&&pm!=='all'&&r.project_manager!==pm) return false;
    if(div&&r.division!==div) return false;
    if(dist&&r.district!==dist) return false;
    if(status&&r.compliance_status!==status) return false;
    if(search){
      var h=[r.project_number,r.project_description,r.project_manager].join(' ').toLowerCase();
      if(h.indexOf(search)<0) return false;
    }
    return true;
  });
}

function sortRows(rows){
  return rows.slice().sort(function(a,b){
    var av=a[sortCol]||'',bv=b[sortCol]||'';
    if(typeof av==='string') return av.localeCompare(bv)*sortDir;
    return (av-bv)*sortDir;
  });
}

function render(){
  var filtered=getFiltered();
  renderSummary(filtered);
  renderFlags(filtered);
  if(currentView==='grouped') renderGrouped(filtered);
  else renderFlat(filtered);
}

function renderSummary(rows){
  var total=rows.length;
  var totalDigs=rows.reduce(function(s,r){return s+(r.number_of_digs||0)},0);
  var doneDigs=rows.reduce(function(s,r){return s+(r.completed_digs||0)},0);
  var redCount=rows.filter(function(r){return r.compliance_status==='overdue'||r.compliance_status==='outage_after_compliance'}).length;
  var flagCount=rows.filter(function(r){return r.compliance_status==='outage_after_compliance'}).length;
  var pct=totalDigs>0?Math.round((doneDigs/totalDigs)*100):0;
  var dentsCount=rows.filter(function(r){return r.has_dents}).length;
  var noAconex=rows.filter(function(r){return !r.in_aconex}).length;
  document.getElementById('summary-cards').innerHTML=
    card('Total Projects',total,'across all divisions','info')+
    card('At Risk',redCount,flagCount+' outage schedule conflicts',redCount>0?'danger':'')+
    card('Total Digs',totalDigs,doneDigs+' done · '+(totalDigs-doneDigs)+' remaining','info')+
    card('Completion',pct+'%','overall dig progress',pct===100?'good':'')+
    card('Dents Flagged',dentsCount,'projects with dent anomalies',dentsCount>0?'warn':'')+
    card('Not in Aconex',noAconex,'upload gap',noAconex>0?'warn':'good');
}

function card(label,val,sub,cls){
  return '<div class="card '+(cls||'')+'"><div class="card-label">'+label+'</div><div class="card-value">'+val+'</div><div class="card-sub">'+sub+'</div></div>';
}

function renderFlags(rows){
  var banner=document.getElementById('flags-banner');
  var items=document.getElementById('flag-items');
  var flags=rows.filter(function(r){return r.compliance_status==='outage_after_compliance'});
  if(!flags.length){banner.classList.remove('visible');return;}
  banner.classList.add('visible');
  items.innerHTML=flags.map(function(r){
    return '<div class="flag-item"><strong>'+(r.project_number||'—')+'</strong> &nbsp;'+esc2(r.project_description||'').substring(0,70)+'&nbsp; · PM: '+(r.project_manager||'—')+' · Compliance: '+(r.compliance_date||'—')+' · Outage Start: '+(r.outage_start||'—')+'</div>';
  }).join('');
}

var COLS=[
  {key:'compliance_status',label:'Status',fn:function(r){return badgeHtml(r.compliance_status)}},
  {key:'project_number',label:'Proj #',fn:function(r){return r.project_number||'<span style="color:#d1d5db">—</span>'}},
  {key:'project_description',label:'Description',fn:function(r){return '<td class="wrap" style="color:#374151">'+esc2(r.project_description||'')+'</td>'},raw:true},
  {key:'division',label:'Division',fn:function(r){return r.division||'<span style="color:#d1d5db">—</span>'}},
  {key:'district',label:'District',fn:function(r){return r.district||'<span style="color:#d1d5db">—</span>'}},
  {key:'project_manager',label:'PM',fn:function(r){return r.project_manager||'<span style="color:#d1d5db">—</span>'}},
  {key:'compliance_date',label:'Compliance Date',fn:function(r){return dateCell(r.compliance_date,r.compliance_status)}},
  {key:'outage_start',label:'Outage Start',fn:function(r){return dateCell(r.outage_start)}},
  {key:'outage_end',label:'Outage End',fn:function(r){return dateCell(r.outage_end)}},
  {key:'number_of_digs',label:'Digs',fn:function(r){return progressCell(r)}},
  {key:'has_dents',label:'Dents',fn:function(r){return r.has_dents?'<span class="tag-dent">YES</span>':'<span class="tag-no">—</span>'}},
  {key:'in_aconex',label:'Aconex',fn:function(r){return r.in_aconex?'<span class="tag-yes">✓</span>':'<span class="tag-no-aconex">✗</span>'}},
  {key:'lowest_sep',label:'SEP',fn:function(r){return r.lowest_sep||'<span style="color:#d1d5db">—</span>'}},
];

function buildTable(rows){
  var headers=COLS.map(function(c){
    var active=c.key===sortCol?' sorted':'';
    var arrow=c.key===sortCol?(sortDir===1?'↑':'↓'):'↕';
    return '<th class="'+active+'" data-col="'+c.key+'">'+c.label+' <span class="sort-arrow">'+arrow+'</span></th>';
  }).join('');
  var body=rows.map(function(r){
    var cells=COLS.map(function(c){
      if(c.raw) return c.fn(r);
      return '<td>'+c.fn(r)+'</td>';
    }).join('');
    return '<tr>'+cells+'</tr>';
  }).join('');
  return '<table><thead><tr>'+headers+'</tr></thead><tbody>'+body+'</tbody></table>';
}

function renderFlat(rows){
  var sorted=sortRows(rows);
  var area=document.getElementById('content-area');
  if(!sorted.length){area.innerHTML=emptyState();return;}
  area.innerHTML='<div class="section-header"><span class="section-title">All Projects</span><span class="row-count">'+sorted.length+' records</span></div><div class="table-wrap">'+buildTable(sorted)+'</div>';
  attachSort();
}

function renderGrouped(rows){
  var area=document.getElementById('content-area');
  if(!rows.length){area.innerHTML=emptyState();return;}
  var byDiv={};
  rows.forEach(function(r){
    var d=r.division||'No Division';
    if(!byDiv[d]) byDiv[d]=[];
    byDiv[d].push(r);
  });
  var html='';
  Object.keys(byDiv).sort().forEach(function(div){
    var divRows=byDiv[div];
    var redCnt=divRows.filter(function(r){return r.compliance_status==='overdue'||r.compliance_status==='outage_after_compliance'}).length;
    var totalD=divRows.reduce(function(s,r){return s+(r.number_of_digs||0)},0);
    var doneD=divRows.reduce(function(s,r){return s+(r.completed_digs||0)},0);
    var riskBadge=redCnt>0?'<span class="badge outage_after_compliance" style="margin-left:10px"><span class="badge-dot"></span>'+redCnt+' at risk</span>':'';
    html+='<div class="rollup-section"><div class="rollup-header" onclick="toggleRollup(this)"><span class="rollup-chevron">▼</span><span class="rollup-div-name">'+esc2(div)+'</span>'+riskBadge+'<div class="rollup-stats"><span class="rollup-stat"><span>'+divRows.length+'</span> projects</span><span class="rollup-stat"><span>'+doneD+'/'+totalD+'</span> digs</span></div></div><div class="rollup-body"><div class="table-wrap">'+buildTable(sortRows(divRows))+'</div></div></div>';
  });
  area.innerHTML=html;
  attachSort();
}

function attachSort(){
  document.querySelectorAll('thead th[data-col]').forEach(function(th){
    th.addEventListener('click',function(){
      var col=th.dataset.col;
      if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=1;}
      render();
    });
  });
}

function toggleRollup(header){
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('hidden');
}

function esc2(v){
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function dateCell(v,status){
  if(!v) return '<span style="color:#d1d5db">—</span>';
  var style=(status==='overdue'||status==='outage_after_compliance')?'color:#dc2626;font-weight:600':'';
  return '<span style="'+style+'">'+v+'</span>';
}
function badgeHtml(status){
  return '<span class="badge '+status+'"><span class="badge-dot"></span>'+(STATUS_LABELS[status]||status)+'</span>';
}
function progressCell(r){
  var n=r.number_of_digs,d=r.completed_digs;
  if(n==null) return '<span style="color:#d1d5db">—</span>';
  var pct=(d!=null&&n>0)?Math.min(100,Math.round((d/n)*100)):0;
  var cls=pct===100?' complete':'';
  return '<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill'+cls+'" style="width:'+pct+'%"></div></div><span class="progress-label">'+(d||0)+'/'+n+'</span></div>';
}
function emptyState(){return '<div class="empty-state">No projects match the current filters.</div>';}

document.getElementById('export-btn').addEventListener('click',function(){
  var rows=getFiltered();
  if(!rows.length) return;
  var keys=Object.keys(rows[0]).filter(function(k){return k!=='source_file'&&k!=='source_sheet'});
  var csv=[keys.join(',')].concat(rows.map(function(r){return keys.map(function(k){return JSON.stringify(r[k]||'')}).join(',')})).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='compliance_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
});

['pm-select','div-filter','dist-filter','status-filter'].forEach(function(id){
  document.getElementById(id).addEventListener('change',render);
});
document.getElementById('search-box').addEventListener('input',render);
document.getElementById('clear-btn').addEventListener('click',function(){
  document.getElementById('pm-select').value='all';
  document.getElementById('div-filter').value='';
  document.getElementById('dist-filter').value='';
  document.getElementById('status-filter').value='';
  document.getElementById('search-box').value='';
  render();
});
document.querySelectorAll('.view-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.view-tab').forEach(function(t){t.classList.remove('active')});
    tab.classList.add('active');
    currentView=tab.dataset.view;
    render();
  });
});

window.addEventListener('load',init);
</script>
